<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RadarAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo-wrap">
        <div class="logo">
          <span class="logo-icon">📡</span>
          <span class="logo-text">Radar<strong>AI</strong></span>
        </div>
        <div class="tagline">Everything AI. Nothing you don't need.</div>
      </div>
      <div class="controls">
        <div class="filter-group">
          <button class="filter-btn active" data-source="all">All</button>
          <button class="filter-btn" data-source="hackernews">Hacker News</button>
          <button class="filter-btn" data-source="devto">Dev.to</button>
          <button class="filter-btn" data-source="rss">Newsletters</button>
          <button class="filter-btn wip" data-source="producthunt" data-wip="true">Product Hunt</button>
          <button class="filter-btn wip" data-source="reddit" data-wip="true">Reddit</button>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="search-input" class="search-input" type="text" placeholder="Search posts…" autocomplete="off" />
        </div>
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme">🌙</button>
        <button id="refresh-btn" class="refresh-btn">
          <span class="refresh-icon">↻</span> Refresh
        </button>
      </div>
    </div>
    <div class="last-fetched" id="last-fetched">Never fetched</div>
  </header>

  <section id="chip-filter">
    <button id="chip-toggle" class="chip-toggle">
      <span>🎛 Filters</span>
      <span id="chip-active-count" class="chip-active-count hidden"></span>
      <span id="chip-arrow" class="chip-arrow">▾</span>
    </button>
    <div id="chip-body" class="chip-body">
      <div class="chip-groups-wrap">
        <div class="chip-group" id="chip-group-ai"></div>
        <div class="chip-group" id="chip-group-topics"></div>
      </div>
      <div class="time-filter-wrap">
        <span class="chip-label">Time Range</span>
        <div class="time-btns">
          <button class="time-btn" data-days="1">1D</button>
          <button class="time-btn" data-days="2">2D</button>
          <button class="time-btn" data-days="7">1W</button>
          <button class="time-btn" data-days="14">2W</button>
          <button class="time-btn" data-days="30">1M</button>
          <button class="time-btn active" data-days="0">All</button>
        </div>
      </div>
      <button id="chip-clear" class="chip-clear-btn hidden">✕ Clear filters</button>
    </div>
  </section>

  <main>
    <div id="status-bar" class="status-bar hidden"></div>
    <div id="cards-grid" class="cards-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <p>No posts found. Try refreshing.</p>
    </div>
  </main>

  <div id="wip-popup" class="wip-popup hidden">
    <div class="wip-popup-inner">
      <span class="wip-icon">🚧</span>
      <div>
        <strong>Work in Progress</strong>
        <p>This source is coming soon!</p>
      </div>
      <button id="wip-close">✕</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
